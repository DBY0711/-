<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPA 调度可视化</title>
<style>
/* ===== RESET ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;background:#f0f2f5;color:#1a1d28;line-height:1.5}

/* ===== LAYOUT ===== */
.container{max-width:1600px;margin:0 auto;padding:16px}

/* ===== BUTTONS ===== */
.btn{padding:7px 14px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-size:0.8rem;transition:all .15s;white-space:nowrap;font-family:inherit}
.btn:hover{background:#f0f0f5}
.btn:active{transform:scale(.97)}
.btn-sm{padding:5px 10px;font-size:.73rem}
.btn-primary{background:#5b6abf;color:#fff;border-color:#5b6abf}
.btn-primary:hover{background:#4a59ad}
.btn-danger{color:#d44;border-color:#fcc}
.btn-danger:hover{background:#fff5f5}
.btn-success{background:#2da87a;color:#fff;border-color:#2da87a}
.btn-success:hover{background:#258d65}

/* ===== HEADER ===== */
.header{background:linear-gradient(135deg,#5b6abf,#7c8cf8);color:#fff;border-radius:10px;padding:16px 24px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.header h1{font-size:1.3rem;font-weight:700}
.header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.header .btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25)}
.header .btn:hover{background:rgba(255,255,255,.25)}
.header .btn-primary{background:rgba(255,255,255,.9);color:#5b6abf;font-weight:600}
.sync-time{font-size:.73rem;color:rgba(255,255,255,.75);margin-left:4px}

/* ===== STATS BAR ===== */
.stats-bar{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.stat-card{background:#fff;border-radius:10px;padding:14px 20px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;align-items:center;gap:12px;flex:1;min-width:140px}
.stat-icon{font-size:1.5rem}
.stat-num{font-size:1.5rem;font-weight:700}
.stat-label{font-size:.73rem;color:#888}

/* ===== CARD ===== */
.card{background:#fff;border-radius:10px;padding:18px 22px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h2{font-size:.95rem;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-actions{display:flex;gap:6px;align-items:center;font-weight:400}

/* ===== FILTER BAR ===== */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-bar input[type="text"]{padding:6px 12px;border:1px solid #ddd;border-radius:6px;font-size:.8rem;width:200px;font-family:inherit}
.filter-bar input[type="text"]:focus{border-color:#5b6abf;outline:none;box-shadow:0 0 0 2px rgba(91,106,191,.1)}
.filter-bar select{padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:.8rem;background:#fff;cursor:pointer;font-family:inherit}
.filter-info{font-size:.73rem;color:#888;margin-left:auto;white-space:nowrap}

/* ===== TABLE ===== */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead th{background:#f8fafc;padding:8px 10px;text-align:left;font-weight:600;border-bottom:2px solid #e8ecf0;font-size:.72rem;color:#888;white-space:nowrap;position:sticky;top:0;z-index:5}
tbody td{padding:6px 10px;border-bottom:1px solid #f0f2f5}
tbody tr:hover td{background:#fafbfe}
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{color:#5b6abf}
th.sortable .arrow{font-size:.6rem;margin-left:2px}

/* ===== INLINE INPUTS ===== */
.inp-cell{border:1px solid transparent;padding:3px 6px;border-radius:4px;font:inherit;background:transparent;width:100%}
.inp-cell:hover{border-color:#ddd}
.inp-cell:focus{border-color:#5b6abf;outline:none;background:#fff}
.inp-time{width:90px;text-align:center;font-family:monospace}
.inp-runtime{width:70px;text-align:center;font-weight:600}
.inp-cat{width:80px}
select.inp-cell{cursor:pointer}

/* ===== CHECKBOX ===== */
.cb{width:16px;height:16px;cursor:pointer;accent-color:#5b6abf}
.cb-wrap{display:inline-flex;align-items:center;gap:4px;font-size:.78rem}

/* ===== GANTT ===== */
.gantt-box{overflow-x:auto}
.gantt{min-width:950px}
.gantt-head{display:flex;padding-left:150px;height:28px;border-bottom:1px solid #eee}
.gantt-head span{flex:1;text-align:center;font-size:.63rem;color:#999;line-height:28px;border-left:1px solid #f0f0f0;user-select:none}
.gantt-row{display:flex;border-bottom:1px solid #f8f8f8;min-height:56px}
.gantt-row:hover{background:#fafbfd}
.gantt-label{width:150px;flex-shrink:0;padding:8px 12px;font-size:.78rem;font-weight:600;border-right:2px solid #f0f0f0;display:flex;align-items:center;gap:8px;position:sticky;left:0;background:#fff;z-index:3}
.gantt-label .dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.gantt-track{flex:1;position:relative;min-height:56px}
.gantt-bar{position:absolute;top:8px;bottom:8px;border-radius:4px;cursor:pointer;display:flex;align-items:center;padding:0 4px;overflow:hidden;white-space:nowrap;font-size:.65rem;color:#fff;font-weight:500;z-index:2;box-shadow:0 1px 3px rgba(0,0,0,.12);transition:filter .12s,box-shadow .12s}
.gantt-bar:hover{filter:brightness(1.12);z-index:20;box-shadow:0 3px 8px rgba(0,0,0,.2)}
.gantt-bar.retry-enabled{border:2px dashed rgba(255,255,255,.5)}
.gantt-bar.status-error{background-image:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(0,0,0,.1) 4px,rgba(0,0,0,.1) 8px)}
.gantt-bar.manual-task{border-radius:4px;border:1px dashed rgba(255,255,255,.6);box-shadow:0 0 0 2px rgba(255,255,255,.3)}

.yd-status{margin-top:10px;font-size:.78rem;color:#888;min-height:20px}

/* ===== STATUS BADGES ===== */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600;white-space:nowrap}
.badge-running{background:#e3f2fd;color:#1565c0}
.badge-done{background:#e8f5e9;color:#2e7d32}
.badge-error{background:#ffebee;color:#c62828}
.badge-timeout{background:#fff3e0;color:#e65100}
.badge-stopped{background:#f3e5f5;color:#6a1b9a}
.badge-retry{background:#fff8e1;color:#f57f17}
.badge-waiting{background:#e3f2fd;color:#1565c0}

/* ===== RETRY CONTROLS ===== */
.retry-count{display:inline-block;padding:1px 6px;border-radius:8px;font-size:.68rem;font-weight:700;min-width:20px;text-align:center}
.retry-count.active{background:#fff3e0;color:#e65100}
.retry-count.zero{background:#f5f5f5;color:#999}
.max-retry-inp{width:45px;text-align:center;padding:2px 4px;border:1px solid #ddd;border-radius:4px;font-size:.75rem}

/* ===== RUN HISTORY ===== */
.collapsible-header{cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px}
.collapsible-header:hover{color:#5b6abf}
#runHistoryPanel{overflow:hidden}
#historyTable{font-size:.78rem}
#historyTable td{font-size:.75rem}

/* ===== BATCH BAR ===== */
.batch-bar{display:none;position:sticky;bottom:0;background:#1a1d28;color:#fff;padding:10px 20px;border-radius:10px;margin-top:8px;align-items:center;gap:10px;z-index:50;flex-wrap:wrap}
.batch-bar.show{display:flex}
.batch-bar select,.batch-bar .btn{font-size:.73rem;font-family:inherit}

/* ===== MODALS ===== */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;justify-content:center;align-items:center}
.modal-bg.show{display:flex}
.modal-box{background:#fff;border-radius:12px;padding:24px;width:520px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-box h3{font-size:1rem;margin-bottom:14px}
.modal-box .actions{display:flex;gap:6px;margin-bottom:10px}
.modal-box .row-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:.82rem}
.modal-box .row-item .n{color:#888;font-size:.73rem}

/* ===== TOOLTIP ===== */
.tooltip{position:fixed;z-index:999;background:#1a1d28;color:#fff;padding:10px 14px;border-radius:8px;font-size:.78rem;pointer-events:none;opacity:0;transition:opacity .15s;max-width:320px}
.tooltip.on{opacity:1}

/* ===== CALLBACK INFO ===== */
.callback-info{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:.78rem}
.callback-info code{background:#f0f0f5;padding:2px 8px;border-radius:4px;font-size:.73rem}

/* ===== CATEGORY STATS ===== */
.cat-stats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.cat-chip{display:inline-block;padding:2px 10px;border-radius:12px;background:#f0f0f5;font-size:.7rem;cursor:pointer;transition:all .15s;user-select:none}
.cat-chip:hover{background:#5b6abf;color:#fff}
.cat-chip.sel{background:#5b6abf;color:#fff}

/* ===== TAB NAV ===== */
.tab-nav{display:flex;gap:0;margin-bottom:14px;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tab-nav button{flex:1;padding:12px 20px;border:none;background:transparent;cursor:pointer;font-size:.85rem;font-weight:600;color:#888;transition:all .15s;font-family:inherit;border-bottom:3px solid transparent}
.tab-nav button:hover{color:#5b6abf;background:#f8fafc}
.tab-nav button.active{color:#5b6abf;border-bottom-color:#5b6abf;background:#f8fafc}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ===== PAGINATION ===== */
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:16px;padding:10px 0;border-top:1px solid #f0f2f5}
.pagination button{padding:6px 14px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-size:.78rem;font-family:inherit;transition:all .15s}
.pagination button:hover:not(:disabled){background:#5b6abf;color:#fff;border-color:#5b6abf}
.pagination button:disabled{opacity:.35;cursor:not-allowed}
.pagination .page-num{display:inline-block;min-width:32px;padding:5px 8px;text-align:center;border-radius:6px;font-size:.78rem;cursor:pointer;transition:all .15s;border:1px solid transparent}
.pagination .page-num:hover{background:#f0f0f5}
.pagination .page-num.active{background:#5b6abf;color:#fff;font-weight:600}
.pagination .page-info{font-size:.76rem;color:#888;margin:0 8px}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .container{padding:8px}
  .header{flex-direction:column;align-items:flex-start}
  .stats-bar{flex-direction:column}
  .stat-card{min-width:auto}
  .gantt-label{width:100px}
  .gantt-head{padding-left:100px}
  .modal-box{width:95vw}
}
</style>
</head>
<body>
<div class="container">

<!-- ===== HEADER ===== -->
<header class="header">
  <h1>📊 RPA 调度可视化</h1>
  <div class="header-actions">
    <button id="btnSync" class="btn btn-primary" onclick="syncYingdao()">🔄 同步影刀数据</button>
    <span class="sync-time" id="lastSyncTime"></span>
    <button class="btn" onclick="exportData()">📥 导出配置</button>
    <button class="btn" onclick="document.getElementById('imp').click()">📤 导入配置</button>
    <input type="file" id="imp" accept=".json" hidden onchange="importData(event)">
    <button class="btn" onclick="resetAll()">🔄 重置</button>
    <button class="btn" onclick="window.open('/api-docs.html')">📡 API文档</button>
    <button class="btn" onclick="logout()">🚪 退出</button>
  </div>
</header>

<!-- ===== STATS BAR ===== -->
<div class="stats-bar" id="statsBar">
  <div class="stat-card"><span class="stat-icon">📋</span><div class="stat-num" id="statTotal">0</div><div class="stat-label">总任务</div></div>
  <div class="stat-card"><span class="stat-icon">✅</span><div class="stat-num" id="statEnabled">0</div><div class="stat-label">已启用</div></div>
  <div class="stat-card"><span class="stat-icon">🖥</span><div class="stat-num" id="statPcs">0</div><div class="stat-label">电脑数</div></div>
</div>

<!-- ===== TAB NAV ===== -->
<div class="tab-nav">
  <button class="active" onclick="switchTab('yingdao')">📊 影刀任务</button>
  <button onclick="switchTab('manual')">📝 手动任务</button>
  <button onclick="switchTab('alerts')">📢 异常提醒</button>
  <button onclick="switchTab('history')">📜 运行记录</button>
</div>

<!-- ===== TAB: 影刀任务 ===== -->
<div class="tab-panel active" id="tab-yingdao">

<!-- ===== FILTER TOOLBAR ===== -->
<div class="card">
  <div class="filter-bar">
    <input type="text" id="fSearch" placeholder="🔍 搜索流程或电脑..." oninput="applyFilters()">
    <select id="fPc" onchange="applyFilters()"><option value="">🖥 全部电脑</option></select>
    <select id="fCategory" onchange="applyFilters()"><option value="">🏷 全部分类</option></select>
    <select id="fStatus" onchange="applyFilters()">
      <option value="">📌 全部状态</option>
      <option value="已启用">已启用</option>
      <option value="已禁用">已禁用</option>
    </select>
    <select id="fSourceType" onchange="applyFilters()">
      <option value="">🔔 全部触发</option>
      <option value="period">🕐 计划触发</option>
      <option value="manual">👆 手动触发</option>
    </select>
    <select id="fRetryEnabled" onchange="applyFilters()">
      <option value="">🔄 全部重试</option>
      <option value="1">✅ 已启用重试</option>
      <option value="0">❌ 未启用重试</option>
    </select>
    <button class="btn btn-sm" onclick="clearFilters()">✕ 清除筛选</button>
    <span class="filter-info" id="filterInfo"></span>
  </div>
  <!-- 分类快速筛选 -->
  <div class="cat-stats" id="catStats"></div>
</div>

<!-- ===== GANTT CHART ===== -->
<div class="card">
  <h2>📅 每日甘特图
    <span class="card-actions">
      <button class="btn btn-sm" onclick="zoomOut()">🔍−</button>
      <input type="range" id="zoomSlider" min="1" max="10" value="2" oninput="setZoom(this.value)" style="width:100px">
      <button class="btn btn-sm" onclick="zoomIn()">🔍+</button>
      <span id="zoomLabel">2×</span>
    </span>
  </h2>
  <div class="gantt-box">
    <div class="gantt" id="gantt"></div>
  </div>
  <div id="ydStatus" class="yd-status"></div>
</div>

<!-- ===== TASK TABLE ===== -->
<div class="card">
  <h2>📝 任务列表
    <span class="card-actions">
      <button class="btn btn-sm btn-primary" onclick="addTask()">＋ 添加任务</button>
      <button class="btn btn-sm" onclick="openPcManager()">🖥 管理电脑</button>
      <button class="btn btn-sm" onclick="openCategoryManager()">🏷 管理分类</button>
      <span class="cb-wrap"><input type="checkbox" id="selectAllHd" class="cb" onchange="toggleSelectAll()"><label>全选</label></span>
    </span>
  </h2>
  <div class="tbl-wrap">
    <table id="taskTable">
      <thead><tr>
        <th style="width:28px"><input type="checkbox" class="cb" id="selectAll" onchange="toggleSelectAll()"></th>
        <th>#</th>
        <th class="sortable" onclick="sortTable('process')">流程名称 <span class="arrow"></span></th>
        <th class="sortable" onclick="sortTable('category')">分类 <span class="arrow"></span></th>
        <th class="sortable" onclick="sortTable('pc')">电脑 <span class="arrow"></span></th>
        <th class="sortable" onclick="sortTable('start')">开始 <span class="arrow"></span></th>
        <th>结束</th>
        <th class="sortable" onclick="sortTable('runtime')">运行时间 <span class="arrow"></span></th>
        <th class="sortable" onclick="sortTable('status')">启用 <span class="arrow"></span></th>
        <th>触发</th>
        <th>最后运行</th>
        <th class="sortable" onclick="sortTable('retryEnabled')">自动重试 <span class="arrow"></span></th>
        <th>最大重试</th>
        <th>已重试</th>
        <th>操作</th>
      </tr></thead>
      <tbody id="tblBody"></tbody>
    </table>
  </div>
  <div id="pageBar"></div>
  <!-- Batch Bar -->
  <div class="batch-bar" id="batchBar">
    <span id="batchCount">已选 0 项</span>
    <button class="btn btn-sm" onclick="batchSetStatus('已启用')">✅ 批量启用</button>
    <button class="btn btn-sm" onclick="batchSetStatus('已禁用')">⏸ 批量禁用</button>
    <button class="btn btn-sm btn-primary" onclick="batchSetRetry(true)">✅ 启用自动重试</button>
    <button class="btn btn-sm" onclick="batchSetRetry(false)">❌ 禁用自动重试</button>
    <button class="btn btn-sm btn-danger" onclick="batchDelete()">🗑 批量删除</button>
    <button class="btn btn-sm" onclick="selected.clear();render()">✕ 取消选择</button>
  </div>
</div>

</div><!-- /tab-yingdao -->

<!-- ===== TAB: 手动任务 ===== -->
<div class="tab-panel" id="tab-manual">
<div class="card">
  <h2>📝 手动任务
    <span class="card-actions">
      <button class="btn btn-sm btn-primary" onclick="addManualTask()">＋ 添加任务</button>
      <span class="cb-wrap"><input type="checkbox" id="selectAllMd" class="cb" onchange="toggleSelectAllManual()"><label>全选</label></span>
    </span>
  </h2>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th style="width:28px"><input type="checkbox" class="cb" id="selectAllM" onchange="toggleSelectAllManual()"></th>
        <th>流程名称</th>
        <th>电脑</th>
        <th>开始</th>
        <th>结束</th>
        <th>运行时间</th>
        <th>触发方式</th>
        <th>操作范围</th>
        <th>启用</th>
        <th>分类</th>
        <th>操作</th>
      </tr></thead>
      <tbody id="manualBody"></tbody>
    </table>
  </div>
</div>
</div><!-- /tab-manual -->

<!-- ===== TAB: 异常提醒 ===== -->
<div class="tab-panel" id="tab-alerts">
<div class="card">
  <h2>📢 异常提醒
    <span class="card-actions">
      <button class="btn" id="alertViewExc" style="background:#ffebee;color:#c62828;border-color:#ffcdd2;font-weight:600;" onclick="setAlertView('异常')">⚠ 异常</button>
      <button class="btn" id="alertViewOk" style="font-weight:600;" onclick="setAlertView('成功')">✅ 成功</button>
      <select onchange="alertSort=this.value;loadAlerts()" style="padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:0.8rem;font-family:inherit;background:#fff;cursor:pointer;">
        <option value="time-desc">⏱ 时间倒序</option>
        <option value="date-group">📅 按日期分组</option>
        <option value="pc">🖥 按电脑排序</option>
      </select>
      <button class="btn" onclick="loadAlerts()">🔄 刷新</button>
      <button class="btn btn-danger" onclick="clearAllAlerts()">🗑 一键清空</button>
    </span>
  </h2>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th style="width:28px">☑</th>
        <th>时间</th>
        <th>流程名称</th>
        <th>电脑</th>
        <th>状态</th>
        <th>错误信息</th>
        <th>运行方式</th>
        <th>备注</th>
        <th>操作</th>
      </tr></thead>
      <tbody id="alertsBody"></tbody>
    </table>
  </div>
</div>
</div><!-- /tab-alerts -->

<!-- ===== TAB: 运行记录 ===== -->
<div class="tab-panel" id="tab-history">

<!-- ===== RUN HISTORY PANEL ===== -->
<div class="card">
  <h2>
    <span class="collapsible-header" onclick="toggleRunHistory()">📜 运行记录 <span id="historyToggle">▼</span></span>
    <span class="card-actions">
      <span class="filter-info" id="historyInfo"></span>
      <button class="btn btn-sm" onclick="refreshRunHistory()">🔄 刷新</button>
      <button class="btn btn-sm btn-danger" onclick="clearHistory()">🗑 清空记录</button>
    </span>
  </h2>
  <div id="runHistoryPanel">
    <div class="filter-bar" style="margin-bottom:8px">
      <input type="text" id="fHistorySearch" placeholder="🔍 搜索流程/电脑/消息..." oninput="refreshRunHistory()">
      <select id="fHistoryStatus" onchange="refreshRunHistory()">
        <option value="">全部状态</option>
        <option value="已完成">已完成</option>
        <option value="错误">错误</option>
        <option value="超时">超时</option>
        <option value="运行中">运行中</option>
        <option value="已停止">已停止</option>
        <option value="已取消">已取消</option>
        <option value="进行中">进行中</option>
        <option value="等待中">等待中</option>
        <option value="停止中">停止中</option>
        <option value="retry_failed">重试失败</option>
      </select>
      <select id="fHistorySource" onchange="refreshRunHistory()">
        <option value="">全部来源</option>
        <option value="yingdao_callback">影刀回调</option>
        <option value="manual_start">手动启动</option>
        <option value="manual_rerun">手动重跑</option>
        <option value="auto_retry">自动重试</option>
        <option value="manual_report">错误报告</option>
      </select>
      <select id="fHistoryRetryType" onchange="refreshRunHistory()">
        <option value="">全部重试类型</option>
        <option value="auto">🤖 自动重试</option>
        <option value="manual">👆 手动重试</option>
      </select>
      <button class="btn btn-sm" onclick="refreshRunHistory()">🔄 刷新</button>
      <button class="btn btn-sm" onclick="loadMoreHistory()" id="btnLoadMore" style="display:none">加载更多...</button>
    </div>
    <div class="tbl-wrap">
      <table id="historyTable">
        <thead><tr>
          <th>时间</th><th>来源</th><th>流程</th><th>电脑</th><th>状态</th><th>运行时长</th><th>重试方式</th><th>消息</th><th>操作</th>
        </tr></thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ===== CALLBACK INFO ===== -->
<div class="card callback-info">
  <span>📡 回调地址：<code id="cbUrl">加载中...</code></span>
  <button class="btn btn-sm" onclick="copyCbUrl()">📋 复制</button>
  <button class="btn btn-sm" onclick="viewCallbacks()">📋 原始回调日志</button>
</div>

</div><!-- /container -->

</div><!-- /tab-history -->

<!-- ===== TOOLTIP ===== -->
<div class="tooltip" id="tip"></div>

<!-- ===== PC MANAGER MODAL ===== -->
<div class="modal-bg" id="pcModalBg" onclick="if(event.target===this)closePcManager()">
  <div class="modal-box" id="pcModalBox"></div>
</div>

<!-- ===== CATEGORY MANAGER MODAL ===== -->
<div class="modal-bg" id="catModalBg" onclick="if(event.target===this)closeCategoryManager()">
  <div class="modal-box" id="catModalBox"></div>
</div>

<!-- ===== CALLBACK LOG MODAL ===== -->
<div class="modal-bg" id="cbLogModalBg" onclick="if(event.target===this)closeCbLog()">
  <div class="modal-box" id="cbLogModalBox"></div>
</div>

<script>
// ============================================================
// 全局状态
// ============================================================
const PC_COLORS = ['#5b6abf','#0891b2','#c026d3','#e05560','#e8a830','#8bc34a','#00bcd4','#ab47bc','#26a69a','#ff7043'];
const pcol = {};
function pcColor(name) { if(!pcol[name]) pcol[name]=PC_COLORS[Object.keys(pcol).length%PC_COLORS.length]; return pcol[name]; }

let tasks = [];
let nid = 1;
let apiAvailable = false;
let zoom = 2;
let filters = { search:'', pc:'', category:'', status:'', sourceType:'', retryEnabled:'' };
let sortBy = 'start';
let sortAsc = true;
let selected = new Set();
let lastSyncTime = '';
let page = 1;
const PER_PAGE = 15;
let historyPage = 1;
const HISTORY_PER_PAGE = 50;

const API_TOKEN = 'rpa-schedule-token-2026';
const apiHeaders = {'Content-Type':'application/json','X-API-Token':API_TOKEN};

let currentTab = 'yingdao';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-nav button').forEach((b,i) => {
    b.classList.toggle('active', ['yingdao','manual','alerts','history'][i] === tab);
  });
  document.querySelectorAll('.tab-panel').forEach(p => {
    p.classList.toggle('active', p.id === 'tab-' + tab);
  });
  if (tab === 'history') refreshRunHistory();
  if (tab === 'manual') renderManual();
  if (tab === 'alerts') loadAlerts();
}

// ============================================================
// 工具函数
// ============================================================
const t2m = s => { const [h,m]=String(s||'00:00').split(':').map(Number); return h*60+m; };
const m2t = m => { m=((m%1440)+1440)%1440; return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); };
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmDuration = s => { if(!s||s<=0)return'0秒'; const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return h>0?h+'时'+(m?m+'分':''):m>0?m+'分':s+'秒'; };
const iso2time = iso => { if(!iso) return ''; try { const d=new Date(iso); return d.toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'}); } catch(e) { return iso; } };

function statusBadge(status) {
  const map = {
    '运行中':'badge-running','已完成':'badge-done','错误':'badge-error',
    '超时':'badge-timeout','已停止':'badge-stopped','已取消':'badge-stopped',
    '等待中':'badge-waiting','停止中':'badge-stopped',
    'retry_queued':'badge-retry','retry_failed':'badge-error'
  };
  const cls = map[status] || '';
  return `<span class="badge ${cls}">${esc(status||'未知')}</span>`;
}

// ============================================================
// 数据加载与持久化
// ============================================================
async function loadData() {
  try {
    const res = await fetch('/api/tasks');
    const json = await res.json();
    apiAvailable = true;
    if (json.success && json.data) {
      tasks = json.data.tasks || [];
      nid = json.data.nid || 1;
      return;
    }
  } catch(e) { apiAvailable = false; }
  const saved = localStorage.getItem('rpa_tasks_v2');
  if (saved) {
    try { const d = JSON.parse(saved); tasks = d.tasks || []; nid = d.nid || 1; return; } catch(e) {}
  }
  tasks = []; nid = 1;
}

function saveData() {
  const payload = JSON.stringify({tasks, nid});
  if (apiAvailable) {
    fetch('/api/tasks', {method:'POST', headers:apiHeaders, body:payload}).catch(()=>{});
  }
  localStorage.setItem('rpa_tasks_v2', payload);
}

let _saveTimer = null;
function debounceSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveData, 300);
}

// ============================================================
// 筛选与排序
// ============================================================
function filteredTasks() {
  let result = tasks.filter(t => {
    if (currentTab === 'yingdao' && t.taskType !== 'yingdao') return false;
    if (currentTab === 'manual' && t.taskType !== 'manual') return false;
    const s = filters.search.toLowerCase();
    if (s && !(t.process||'').toLowerCase().includes(s) && !(t.pc||'').toLowerCase().includes(s) && !(t.robotName||'').toLowerCase().includes(s)) return false;
    if (filters.pc && t.pc !== filters.pc) return false;
    if (filters.category && t.category !== filters.category) return false;
    if (filters.status && t.status !== filters.status) return false;
    if (filters.sourceType && t.sourceType !== filters.sourceType) return false;
    if (filters.retryEnabled === '1' && !t.retryEnabled) return false;
    if (filters.retryEnabled === '0' && t.retryEnabled) return false;
    return true;
  });
  result.sort((a,b) => {
    let va, vb;
    if (sortBy === 'start') { va=t2m(a.start); vb=t2m(b.start); }
    else if (sortBy === 'runtime') { va=a.runtime||0; vb=b.runtime||0; }
    else if (sortBy === 'category') { va=a.category||''; vb=b.category||''; }
    else if (sortBy === 'pc') { va=a.pc||''; vb=b.pc||''; }
    else if (sortBy === 'status') { va=a.status||''; vb=b.status||''; }
    else if (sortBy === 'process') { va=a.process||''; vb=b.process||''; }
    else if (sortBy === 'retryEnabled') { va=a.retryEnabled?1:0; vb=b.retryEnabled?1:0; }
    else { va=a.process||''; vb=b.process||''; }
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb,'zh') : vb.localeCompare(va,'zh');
    return sortAsc ? va - vb : vb - va;
  });
  return result;
}

function applyFilters() {
  filters.search = document.getElementById('fSearch').value;
  filters.pc = document.getElementById('fPc').value;
  filters.category = document.getElementById('fCategory').value;
  filters.status = document.getElementById('fStatus').value;
  filters.sourceType = document.getElementById('fSourceType').value;
  filters.retryEnabled = document.getElementById('fRetryEnabled').value;
  selected.clear(); page = 1;
  render();
}

function clearFilters() {
  ['fSearch','fPc','fCategory','fStatus','fSourceType','fRetryEnabled'].forEach(id => document.getElementById(id).value = '');
  applyFilters();
}

function sortTable(col) {
  if (sortBy === col) sortAsc = !sortAsc;
  else { sortBy = col; sortAsc = true; }
  page = 1;
  render();
}

function toggleSelectAll() {
  const f = filteredTasks();
  if (selected.size === f.length && f.length > 0) selected.clear();
  else f.forEach(t => selected.add(t.id));
  render();
}

function toggleSel(id) {
  if (selected.has(id)) selected.delete(id); else selected.add(id);
  render();
}

// ============================================================
// 渲染引擎
// ============================================================
function render() {
  const filtered = filteredTasks();
  renderStats(filtered);
  renderGantt(filtered);
  renderTable(filtered);
  renderFilters(filtered);
  renderBatchBar();
  renderCatStats();
  saveData();
}

function renderStats(filtered) {
  document.getElementById('statTotal').textContent = tasks.length;
  document.getElementById('statEnabled').textContent = tasks.filter(t => t.status==='已启用' && t.taskType==='yingdao').length;
  document.getElementById('statPcs').textContent = new Set(tasks.map(t=>t.pc).filter(p=>p)).size;
}

function renderGantt(filtered) {
  const ganttData = filtered.filter(t => t.status === '已启用' && t.pc);
  const grp = {}; ganttData.forEach(t => { if(!grp[t.pc]) grp[t.pc]=[]; grp[t.pc].push(t); });
  const plist = Object.keys(grp).sort();
  // 基础宽度：zoom=1 时 24小时 ≈ 950px，zoom 越大列越宽但比例不变
  const baseWidth = 950 * zoom;
  const slotsPerHr = zoom <= 2 ? 1 : zoom <= 5 ? 2 : 4;
  const totalCols = 24 * slotsPerHr;

  let html = `<div class="gantt-head" style="min-width:${baseWidth}px;">`;
  for (let h = 0; h < 24; h++) {
    // 每列宽度按 zoom 比例，但用 px 不用 flex
    const colW = (baseWidth - 150) / totalCols;
    html += `<span style="flex:none;width:${colW * slotsPerHr}px;">${String(h).padStart(2,'0')}:00</span>`;
    if (slotsPerHr >= 2) {
      for (let s = 1; s < slotsPerHr; s++) {
        html += `<span style="flex:none;width:${colW}px;font-size:0.55rem;">${String(h).padStart(2,'0')}:${String(Math.floor(s*60/slotsPerHr)).padStart(2,'0')}</span>`;
      }
    }
  }
  html += '</div>';

  if (plist.length === 0) {
    html += '<div style="color:#ccc;padding:32px;text-align:center;">暂无甘特图数据 — 点击「🔄 同步影刀数据」拉取任务</div>';
  }

  plist.forEach((pcName, i) => {
    const items = grp[pcName].sort((a,b) => t2m(a.start) - t2m(b.start));
    html += `<div class="gantt-row" style="min-width:${baseWidth}px;">`;
    html += `<div class="gantt-label"><span class="dot" style="background:${PC_COLORS[i%PC_COLORS.length]};"></span>${esc(pcName)} <small style="color:#999;font-weight:400;">${items.length}个</small></div>`;
    html += `<div class="gantt-track">`;

    items.forEach(task => {
      const s = t2m(task.start || '00:00');
      // 百分比相对于24小时，不随 zoom 变化
      const lp = (s / 1440) * 100;
      const rt = task.runtime || 0;
      const wp = (rt / 86400) * 100;
      const c = pcColor(task.process || '');
      const isError = ['错误','超时','已取消'].includes(task.runStatus||'');
      const isManual = task.taskType === 'manual';
      const extraClass = (isError ? ' status-error' : '') + (task.retryEnabled ? ' retry-enabled' : '') + (isManual ? ' manual-task' : '');
      html += `<div class="gantt-bar${extraClass}" style="left:${lp}%;width:${Math.max(wp,0.2)}%;background:${c};"
        onmouseenter="shTip(event,${task.id})" onmouseleave="hiTip()"
        ondblclick="renameProcess(${task.id})"
        title="${esc(task.process||'')} | ${task.start||'--'} - ${task.end||'--'} | ${fmDuration(rt)} | ${task.status||''}">`;
      if (wp >= 0.8) html += `<span>${esc(task.process||'')}</span>`;
      html += '</div>';
    });

    html += '</div></div>';
  });
  document.getElementById('gantt').innerHTML = html;
}

function renderTable(filtered) {
  const body = document.getElementById('tblBody');
  const totalPages = Math.ceil(filtered.length / PER_PAGE) || 1;
  if (page > totalPages) page = totalPages;
  const paged = filtered.slice((page - 1) * PER_PAGE, page * PER_PAGE);
  const startNum = (page - 1) * PER_PAGE;

  if (filtered.length === 0) {
    body.innerHTML = `<tr><td colspan="15" style="text-align:center;padding:40px;color:#ccc;">无匹配结果 — 点击「🔄 同步影刀数据」拉取任务</td></tr>`;
    document.getElementById('filterInfo').textContent = '';
    return;
  }

  body.innerHTML = paged.map((t, i) => {
    const c = pcColor(t.process || '');
    const chk = selected.has(t.id) ? ' checked' : '';
    const retryActive = t.retryEnabled && (t.retryCount || 0) > 0;
    return `<tr id="row-${t.id}">
      <td><input type="checkbox" class="cb" onchange="toggleSel(${t.id})"${chk}></td>
      <td>${startNum + i + 1}</td>
      <td>
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c};margin-right:4px;flex-shrink:0;"></span>
        <input class="inp-cell" value="${esc(t.process||'')}" onchange="upd(${t.id},'process',this.value)" title="${esc(t.process||'')}" style="min-width:140px;font-weight:500;">
      </td>
      <td><input class="inp-cell inp-cat" list="catDatalist" value="${esc(t.category||'')}" onchange="upd(${t.id},'category',this.value)" placeholder="分类"></td>
      <td><input class="inp-cell" value="${esc(t.pc||'')}" onchange="upd(${t.id},'pc',this.value)" style="width:95px;"></td>
      <td><input class="inp-cell inp-time" type="time" value="${t.start||'09:00'}" onchange="upd(${t.id},'start',this.value)"></td>
      <td><input class="inp-cell inp-time" type="time" value="${t.end||'09:05'}" onchange="upd(${t.id},'end',this.value)"></td>
      <td><input class="inp-cell inp-runtime" type="number" value="${t.runtime||0}" placeholder="秒" min="0" onblur="upd(${t.id},'runtime',parseInt(this.value)||0)" onkeydown="if(event.key==='Enter')this.blur()"></td>
      <td><select class="inp-cell" onchange="upd(${t.id},'status',this.value)">
        <option${t.status==='已启用'?' selected':''}>已启用</option>
        <option${t.status==='已禁用'?' selected':''}>已禁用</option>
      </select></td>
      <td style="text-align:center;">${t.sourceType==='period'?'🕐 计划':'👆 手动'}</td>
      <td style="font-size:0.7rem;color:#888;">${iso2time(t.lastRun)||'--'}</td>
      <td style="text-align:center;">
        <input type="checkbox" class="cb" ${t.retryEnabled?'checked':''} onchange="upd(${t.id},'retryEnabled',this.checked)" title="失败时自动重试">
      </td>
      <td style="text-align:center;">
        <input class="max-retry-inp" type="number" value="${t.maxRetry||3}" min="1" max="10" onchange="upd(${t.id},'maxRetry',parseInt(this.value)||3)" title="最大重试次数">
      </td>
      <td style="text-align:center;">
        <span class="retry-count ${retryActive?'active':'zero'}" title="当前已重试次数">${t.retryCount||0}</span>
      </td>
      <td>
        <button class="btn btn-sm btn-primary" onclick="startTask(${t.id})" title="启动任务">▶</button>
        <button class="btn btn-sm btn-danger" onclick="del(${t.id})" title="删除">🗑</button>
      </td>
    </tr>`;
  }).join('');

  // 翻页控件
  let ph = '<div class="pagination">';
  ph += `<button onclick="goPage(${page-1})" ${page<=1?'disabled':''}>◀ 上一页</button>`;
  // 页码按钮
  for (let p = 1; p <= totalPages; p++) {
    if (totalPages <= 7 || p === 1 || p === totalPages || Math.abs(p - page) <= 1) {
      ph += `<span class="page-num${p===page?' active':''}" onclick="goPage(${p})">${p}</span>`;
    } else if (p === 2 && page > 4) {
      ph += '<span style="color:#ccc;">...</span>';
    } else if (p === totalPages - 1 && page < totalPages - 3) {
      ph += '<span style="color:#ccc;">...</span>';
    }
  }
  ph += `<button onclick="goPage(${page+1})" ${page>=totalPages?'disabled':''}>下一页 ▶</button>`;
  ph += `<span class="page-info">共 ${filtered.length} 条</span>`;
  ph += '</div>';
  document.getElementById('pageBar').innerHTML = ph;
  document.getElementById('filterInfo').textContent = `显示 ${filtered.length} / ${tasks.filter(t=>t.taskType==='yingdao').length} 条`;
}

function goPage(p) {
  page = Math.max(1, p);
  render();
}

function renderFilters(filtered) {
  const allPcs = [...new Set(tasks.map(t=>t.pc).filter(p=>p))].sort();
  const pcSel = document.getElementById('fPc');
  const curPc = pcSel.value;
  pcSel.innerHTML = '<option value="">🖥 全部电脑</option>' + allPcs.map(p => `<option${p===curPc?' selected':''}>${esc(p)}</option>`).join('');

  const cats = [...new Set(tasks.map(t=>t.category||''))].filter(c=>c).sort();
  const catSel = document.getElementById('fCategory');
  const curCat = catSel.value;
  catSel.innerHTML = '<option value="">🏷 全部分类</option>' + cats.map(c => `<option${c===curCat?' selected':''}>${esc(c)}</option>`).join('');

  let dl = document.getElementById('catDatalist');
  if (!dl) { dl = document.createElement('datalist'); dl.id = 'catDatalist'; document.body.appendChild(dl); }
  dl.innerHTML = cats.map(c => `<option value="${esc(c)}">`).join('');

  const allChecked = filtered.length > 0 && selected.size === filtered.length;
  document.getElementById('selectAll').checked = allChecked;
  document.getElementById('selectAllHd').checked = allChecked;
}

function renderBatchBar() {
  const bar = document.getElementById('batchBar');
  if (selected.size > 0) {
    bar.classList.add('show');
    document.getElementById('batchCount').textContent = `已选 ${selected.size} 项`;
  } else {
    bar.classList.remove('show');
  }
}

function renderCatStats() {
  const cats = {};
  tasks.forEach(t => { const c = t.category || '未分类'; cats[c] = (cats[c]||0)+1; });
  const cur = filters.category;
  document.getElementById('catStats').innerHTML = Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([k,v]) =>
    `<span class="cat-chip${k===cur?' sel':''}" onclick="document.getElementById('fCategory').value='${esc(k)}';applyFilters()">${esc(k)} (${v})</span>`
  ).join('');
}

// ============================================================
// 任务 CRUD
// ============================================================
function upd(id, field, value) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t[field] = value;
  if (field === 'start' || field === 'end') {
    const s = t2m(t.start || '00:00'), e = t2m(t.end || '00:00');
    t.runtime = Math.max(0, (e - s) * 60);
  }
  if (field === 'runtime') {
    t.end = m2t(t2m(t.start || '00:00') + Math.ceil((value || 0) / 60));
  }
  render();
  if (currentTab === 'manual') renderManual();
  debounceSave();
}

function addTask() {
  const pcs = [...new Set(tasks.map(t => t.pc))];
  const nt = {
    id: nid++, scheduleUuid: '', robotUuid: '', robotName: '',
    process: '新流程', pc: pcs[0] || '电脑A',
    start: '09:00', end: '09:30', runtime: 1800,
    status: '已启用', runStatus: '', lastRun: '', runTimes: 0,
    category: '', retryEnabled: false, maxRetry: 3, retryCount: 0, sourceType: '',
    taskType: 'yingdao', triggerMethod: '', operationScope: ''
  };
  tasks.unshift(nt);
  render();
  setTimeout(() => { const r = document.getElementById('row-'+nt.id); if(r) r.scrollIntoView({behavior:'smooth',block:'center'}); }, 100);
}

// ===== 手动任务 =====
function manualTasks() { return tasks.filter(t => t.taskType === 'manual'); }

function addManualTask() {
  const pcs = [...new Set(tasks.map(t => t.pc))];
  const nt = {
    id: nid++, scheduleUuid: '', robotUuid: '', robotName: '',
    process: '手动任务', pc: pcs[0] || '电脑A',
    start: '09:00', end: '09:30', runtime: 1800,
    status: '已启用', runStatus: '', lastRun: '', runTimes: 0,
    category: '', retryEnabled: false, maxRetry: 3, retryCount: 0, sourceType: '',
    taskType: 'manual', triggerMethod: '手动', operationScope: ''
  };
  tasks.unshift(nt);
  renderManual();
}

function renderManual() {
  const list = manualTasks();
  const body = document.getElementById('manualBody');
  if (list.length === 0) {
    body.innerHTML = '<tr><td colspan="11" style="text-align:center;padding:40px;color:#ccc;">暂无手动任务 — 点击「＋ 添加任务」创建</td></tr>';
    return;
  }
  body.innerHTML = list.map(t => `<tr>
    <td><input type="checkbox" class="cb" onchange="toggleSel(${t.id})"${selected.has(t.id)?' checked':''}></td>
    <td><input class="inp-cell" value="${esc(t.process||'')}" onchange="upd(${t.id},'process',this.value)" title="${esc(t.process||'')}" style="min-width:120px;font-weight:500;"></td>
    <td><input class="inp-cell" value="${esc(t.pc||'')}" onchange="upd(${t.id},'pc',this.value)" style="width:90px;"></td>
    <td><input class="inp-cell inp-time" type="time" value="${t.start||'09:00'}" onchange="upd(${t.id},'start',this.value)"></td>
    <td><input class="inp-cell inp-time" type="time" value="${t.end||'09:05'}" onchange="upd(${t.id},'end',this.value)"></td>
    <td><input class="inp-cell inp-runtime" type="number" value="${t.runtime||0}" onblur="upd(${t.id},'runtime',parseInt(this.value)||0)"></td>
    <td><input class="inp-cell" value="${esc(t.triggerMethod||'')}" onchange="upd(${t.id},'triggerMethod',this.value)" placeholder="如:webhook" style="width:80px;"></td>
    <td><input class="inp-cell" value="${esc(t.operationScope||'')}" onchange="upd(${t.id},'operationScope',this.value)" placeholder="如:全平台" style="width:80px;"></td>
    <td><select class="inp-cell" onchange="upd(${t.id},'status',this.value)" style="width:70px;">
      <option${t.status==='已启用'?' selected':''}>已启用</option>
      <option${t.status==='已禁用'?' selected':''}>已禁用</option>
    </select></td>
    <td><input class="inp-cell inp-cat" list="catDatalist" value="${esc(t.category||'')}" onchange="upd(${t.id},'category',this.value)"></td>
    <td><button class="btn btn-sm btn-danger" onclick="del(${t.id});renderManual()">🗑</button></td>
  </tr>`).join('');
  document.getElementById('selectAllM').checked = list.length > 0 && list.every(t => selected.has(t.id));
}

function toggleSelectAllManual() {
  const list = manualTasks();
  if (list.every(t => selected.has(t.id))) list.forEach(t => selected.delete(t.id));
  else list.forEach(t => selected.add(t.id));
  renderManual();
  renderBatchBar();
}

function updManual(id, field, value) {
  upd(id, field, value);
  renderManual();
}

function del(id) {
  if (!confirm('确定删除该任务？')) return;
  tasks = tasks.filter(t => t.id !== id);
  selected.delete(id);
  render();
}

function renameProcess(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  const v = prompt('流程名称：', t.process);
  if (v && v.trim()) { t.process = v.trim(); render(); }

// ============================================================
// 影刀集成
// ============================================================
function syncYingdao() {
  if (!apiAvailable) { alert('需要服务器模式才能同步影刀数据'); return; }
  const statusEl = document.getElementById('ydStatus');
  const btn = document.getElementById('btnSync');
  statusEl.innerHTML = '<span style="color:#0891b2;">⏳ 正在从影刀同步数据...</span>';
  btn.disabled = true;

  fetch('/api/yingdao/sync', {method:'POST'})
    .then(r => r.json())
    .then(d => {
      btn.disabled = false;
      if (!d.success) {
        statusEl.innerHTML = `<span style="color:#d44;">❌ 同步失败：${esc(d.message||'')}</span>`;
        return;
      }
      statusEl.innerHTML = `<span style="color:#2da87a;">✅ ${d.message}</span> <span style="color:#888;margin-left:8px;">计划：${d.scheduleCount} | 运行记录：${d.runCount}</span>`;
      lastSyncTime = new Date().toLocaleString('zh-CN');
      document.getElementById('lastSyncTime').textContent = `上次同步：${lastSyncTime}`;
      loadData().then(() => { selected.clear(); render(); refreshRunHistory(); });
    })
    .catch(e => {
      btn.disabled = false;
      statusEl.innerHTML = `<span style="color:#d44;">❌ 网络错误：${esc(e.message)}</span>`;
    });
}

function startTask(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  if (!apiAvailable) { alert('需要服务器模式'); return; }

  const statusEl = document.getElementById('ydStatus');
  const row = document.getElementById('row-' + id);
  const btn = row ? row.querySelector('.btn-primary') : null;
  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }

  statusEl.innerHTML = '<span style="color:#0891b2;">⏳ 正在启动：' + esc(t.process) + '...</span>';

  fetch('/api/yingdao/start', {
    method:'POST', headers:apiHeaders,
    body: JSON.stringify({scheduleUuid: t.scheduleUuid, robotUuid: t.robotUuid, pc: t.pc, process: t.process})
  })
    .then(r => r.json())
    .then(d => {
      if (btn) { btn.disabled = false; btn.textContent = '▶'; }
      if (d.success) {
        statusEl.innerHTML = '<span style="color:#2da87a;">✅ 已启动：' + esc(t.process) + '</span>';
      } else {
        statusEl.innerHTML = '<span style="color:#d44;">❌ 启动失败：' + esc(d.message||'') + '</span>';
      }
    })
    .catch(e => {
      if (btn) { btn.disabled = false; btn.textContent = '▶'; }
      statusEl.innerHTML = '<span style="color:#d44;">❌ 网络错误</span>';
    });
}

function refreshRunHistory() {
  if (!apiAvailable) {
    document.getElementById('historyBody').innerHTML = '<tr><td colspan="9" style="color:#ccc;text-align:center;padding:20px;">需要服务器模式查看运行记录</td></tr>';
    document.getElementById('historyInfo').textContent = '';
    return;
  }
  historyPage = 1;
  loadRunHistory();
}

function loadMoreHistory() {
  historyPage++;
  loadRunHistory(true);
}

function loadRunHistory(append = false) {
  const search = document.getElementById('fHistorySearch').value;
  const status = document.getElementById('fHistoryStatus').value;
  const source = document.getElementById('fHistorySource').value;
  const retryType = document.getElementById('fHistoryRetryType').value;
  let url = `/api/yingdao/run-history?page=${historyPage}&per_page=${HISTORY_PER_PAGE}`;
  if (search) url += `&search=${encodeURIComponent(search)}`;
  if (status) url += `&status=${encodeURIComponent(status)}`;
  if (source) url += `&source=${encodeURIComponent(source)}`;
  if (retryType) url += `&retryType=${encodeURIComponent(retryType)}`;

  fetch(url).then(r=>r.json()).then(d => {
    if (!d.success) return;
    document.getElementById('historyInfo').textContent = `共 ${d.total} 条 | 第 ${d.page}/${d.total_pages} 页`;
    document.getElementById('btnLoadMore').style.display = historyPage < d.total_pages ? '' : 'none';

    const srcLabelMap = {yingdao_callback:'📡 影刀回调',manual_rerun:'👆 手动重跑',manual_start:'👆 手动启动',manual_report:'📝 错误报告',auto_retry:'🤖 自动重试'};
    const rows = d.records.map(r => {
      const srcLabel = srcLabelMap[r.source] || r.source;
      // 重试方式标记
      let retryTypeHtml = '—';
      if (r.retryType === 'auto') {
        retryTypeHtml = '<span class="badge badge-retry">🤖 自动 #' + (r.retryCount||0) + '</span>';
      } else if (r.retryType === 'manual') {
        retryTypeHtml = '<span style="color:#1565c0;font-size:0.73rem;">👆 手动</span>';
      } else if (r.retryTriggered) {
        retryTypeHtml = '<span class="badge badge-retry">🔄 重试 #' + (r.retryCount||0) + '</span>';
      }
      return `<tr>
        <td style="white-space:nowrap;font-size:0.73rem;">${iso2time(r.time)}</td>
        <td style="font-size:0.78rem;">${srcLabel}</td>
        <td><b>${esc(r.process||'')}</b></td>
        <td>${esc(r.pc||'')}</td>
        <td>${statusBadge(r.status)}</td>
        <td style="white-space:nowrap;font-size:0.73rem;">${r.startTime&&r.endTime?(()=>{try{const s=new Date(r.startTime),e=new Date(r.endTime);const sec=Math.round((e-s)/1000);return sec>=3600?Math.floor(sec/3600)+'时'+Math.floor((sec%3600)/60)+'分':sec>=60?Math.floor(sec/60)+'分'+sec%60+'秒':sec+'秒'}catch(e){return'--'}})():r.startTime?'进行中':'--'}</td>
        <td style="text-align:center;">${retryTypeHtml}</td>
        <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(r.msg||'')}">${esc((r.msg||'').substring(0,40))}</td>
        <td><button class="btn btn-sm btn-danger" onclick="deleteHistory('${esc(r.id)}')" style="padding:2px 6px;font-size:0.65rem;" title="删除">✕</button></td>
      </tr>`;
    }).join('');

    document.getElementById('historyBody').innerHTML = append
      ? document.getElementById('historyBody').innerHTML + rows
      : rows || '<tr><td colspan="9" style="color:#ccc;text-align:center;padding:20px;">暂无运行记录</td></tr>';
  }).catch(() => {
    if (!append) document.getElementById('historyBody').innerHTML = '<tr><td colspan="9" style="color:#d44;text-align:center;padding:20px;">加载失败</td></tr>';
  });
}

function deleteHistory(rid) {
  if (!confirm('确定删除该条运行记录？')) return;
  fetch('/api/yingdao/run-history/' + encodeURIComponent(rid), {method:'DELETE'})
    .then(r => r.json())

}

function clearHistory() {
  if (!confirm('确定清空全部运行记录？此操作不可恢复！')) return;
  fetch('/api/yingdao/run-history', {method:'DELETE'})

    .then(() => refreshRunHistory());

// ============================================================
function exportData() {
  const blob = new Blob([JSON.stringify({tasks, nid, exportedAt: new Date().toISOString()}, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `rpa_tasks_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.tasks) { alert('无效的配置文件：缺少 tasks 字段'); return; }
      tasks = data.tasks;
      nid = data.nid || Math.max(...tasks.map(t=>t.id), 0) + 1;
      selected.clear();
      clearFilters();
      render();
      alert(`导入成功：${tasks.length} 条任务`);
    } catch(err) { alert('文件解析失败：' + err.message); }
  };
  reader.readAsText(file, 'UTF-8');
  e.target.value = '';
}

function resetAll() {
  if (!confirm('确定重置所有数据？此操作不可恢复！')) return;
  tasks = []; nid = 1; selected.clear();
  clearFilters();
  render();
}

// ============================================================
// 异常提醒
// ============================================================
let alertView = '异常';
let alertSort = 'time-desc';  // time-desc / pc / date-group

function setAlertView(v) {
  alertView = v;
  document.getElementById('alertViewExc').style.background = v==='异常' ? '#ffebee' : '';
  document.getElementById('alertViewOk').style.background = v==='成功' ? '#e8f5e9' : '';
  loadAlerts();
}

function loadAlerts() {
  if (!apiAvailable) return;
  fetch('/api/alerts?status=' + alertView)
    .then(r => r.json())
    .then(d => {
      let alerts = d.alerts || [];
      const body = document.getElementById('alertsBody');
      if (alerts.length === 0) {
        body.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:40px;color:#ccc;">暂无' + alertView + '记录</td></tr>';
        return;
      }
      // 排序
      if (alertSort === 'pc') alerts.sort((a,b) => (a.pc||'').localeCompare(b.pc||''));
      else if (alertSort === 'date-group') alerts.sort((a,b) => (b.time||'').localeCompare(a.time||''));

      let lastDate = '';
      body.innerHTML = alerts.map(a => {
        const runMode = a.retryType === 'auto' ? '<span style="color:#e65100;font-weight:600;">🤖 自动运行</span>'
          : (a.retryType === 'manual' || a.status === '成功') ? '<span style="color:#1565c0;font-weight:600;">👆 手动运行</span>'
          : '<span style="color:#888;">--</span>';
        const isExc = a.status === '异常';
        const dateStr = (a.time||'').slice(0,10);
        let dateRow = '';
        if (alertSort === 'date-group' && dateStr !== lastDate) {
          lastDate = dateStr;
          dateRow = '<tr style="background:#f8fafc;"><td colspan="9" style="padding:6px 10px;font-weight:700;font-size:0.78rem;color:#5b6abf;">📅 ' + dateStr + '</td></tr>';
        }
        return dateRow + '<tr>\
        <td><input type="checkbox" class="cb" '+(a.checked?'checked':'')+' onchange="toggleAlertCheck(\''+esc(a.id)+'\',this.checked)"></td>\
        <td style="white-space:nowrap;font-size:0.73rem;">'+iso2time(a.time)+'</td>\
        <td title="'+esc(a.process||'')+'"><b>'+esc(a.process||'')+'</b></td>\
        <td title="'+esc(a.pc||'')+'">'+esc(a.pc||'')+'</td>\
        <td>'+statusBadge(a.status)+'</td>\
        <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+esc(a.msg||'')+'">'+esc((a.msg||'').substring(0,50))+'</td>\
        <td>'+runMode+'</td>\
        <td><input class="inp-cell" value="'+esc(a.note||'')+'" onchange="updateAlertNote(\''+esc(a.id)+'\',this.value)" placeholder="备注" style="width:70px;font-size:0.7rem;"></td>\
        <td style="white-space:nowrap;">'+
          (isExc
            ? '<button class="btn btn-sm btn-primary" onclick="retryAlert(\''+esc(a.id)+'\',\''+esc(a.process||'')+'\')" style="margin-right:4px;" title="启动任务重跑">🔄 重跑</button>'+
              '<button class="btn btn-sm btn-success" onclick="markAlertDone(\''+esc(a.id)+'\')" style="margin-right:4px;" title="手动标记已处理">✅ 处理</button>'
            : '<button class="btn btn-sm" onclick="undoAlert(\''+esc(a.id)+'\')" style="margin-right:4px;color:#e65100;border-color:#ffe0b2;background:#fff8e1;" title="撤销回异常状态">↩ 撤销</button>')+
          '<button class="btn btn-sm btn-danger" onclick="delAlert(\''+esc(a.id)+'\')" title="删除此条">✕ 删除</button></td>\
      </tr>';
      }).join('');
    });
}

function toggleAlertCheck(id, checked) {
  fetch('/api/alerts/' + id, {method:'PUT', headers: apiHeaders, body: JSON.stringify({checked})});
}
function updateAlertNote(id, note) {
  fetch('/api/alerts/' + id, {method:'PUT', headers: apiHeaders, body: JSON.stringify({note})});
}
function markAlertDone(id) {
  fetch('/api/alerts/' + id, {method:'PUT', headers: apiHeaders,
    body: JSON.stringify({status:'成功', checked:true, retryType:'manual'})})
    .then(() => loadAlerts());
}
function undoAlert(id) {
  fetch('/api/alerts/' + id, {method:'PUT', headers: apiHeaders,
    body: JSON.stringify({status:'异常', checked:false})})
    .then(() => loadAlerts());
}

function retryAlert(id, process) {
  const task = tasks.find(t => (t.process||'').toLowerCase() === (process||'').toLowerCase());
  if (!task) { alert('未匹配到任务: ' + process + '（请先在影刀任务中同步）'); return; }
  if (!apiAvailable) { alert('需要服务器模式'); return; }
  if (!task.scheduleUuid && !task.robotUuid) { alert('该任务缺少 scheduleUuid 或 robotUuid，无法启动'); return; }

  const statusEl = document.getElementById('ydStatus');
  statusEl.innerHTML = '<span style="color:#0891b2;">⏳ 手动重试：' + esc(process) + '...</span>';

  // 调用启动接口，实际运行任务
  fetch('/api/yingdao/start', {
    method:'POST', headers: apiHeaders,
    body: JSON.stringify({scheduleUuid: task.scheduleUuid, robotUuid: task.robotUuid, pc: task.pc, process: task.process})
  }).then(r => r.json()).then(d => {
    if (d.success) {
      statusEl.innerHTML = '<span style="color:#2da87a;">✅ 已启动：' + esc(task.process) + '（等待运行结果...）</span>';
      // 不立即标成功，等回调确认实际结果后才自动更新状态
      fetch('/api/alerts/' + id, {method:'PUT', headers: apiHeaders,
        body: JSON.stringify({retryType:'manual', note:'手动重试已启动 ' + new Date().toLocaleString('zh-CN')})
      }).then(() => loadAlerts());
    } else {
      statusEl.innerHTML = '<span style="color:#d44;">❌ 启动失败：' + esc(d.message||'') + '</span>';
    }
  }).catch(e => { statusEl.innerHTML = '<span style="color:#d44;">❌ 网络错误</span>'; });
}

function delAlert(id) {
  fetch('/api/alerts/' + id, {method:'DELETE', headers: apiHeaders}).then(() => loadAlerts());
}

function clearAllAlerts() {
  if (!confirm('确定清空全部告警记录？此操作不可恢复！')) return;
  fetch('/api/alerts', {method:'DELETE', headers: apiHeaders})
    .then(r => r.json())
    .then(d => { alert(d.message || '已清空'); loadAlerts(); });
}

// ============================================================
// 回调日志查看
// ============================================================
function copyCbUrl() {
  const url = document.getElementById('cbUrl').textContent;
  navigator.clipboard.writeText(url).then(() => {
    const btn = event.target;
    btn.textContent = '✅ 已复制';
    setTimeout(() => btn.textContent = '📋 复制', 1500);
  }).catch(() => alert('复制失败，请手动复制'));
}

function viewCallbacks() {
  if (!apiAvailable) { alert('需要服务器模式'); return; }
  fetch('/api/yingdao/callbacks').then(r=>r.json()).then(d => {
    const logs = d.logs || [];
    document.getElementById('cbLogModalBox').innerHTML = `
      <h3>📋 原始回调日志（最近 ${logs.length} 条）
        ${logs.length > 0 ? '<button class="btn btn-sm btn-danger" onclick="clearCallbacks()" style="margin-left:12px;">🗑 清空全部</button>' : ''}
      </h3>
      <div style="max-height:60vh;overflow-y:auto;">
        ${logs.slice().reverse().map(l => `
          <div style="margin-bottom:8px;padding:8px;background:#f8fafc;border-radius:6px;font-size:0.73rem;position:relative;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <b>${iso2time(l.time)}</b>
              <button class="btn btn-sm btn-danger" onclick="deleteCallback('${esc(l.time)}')" style="padding:2px 6px;font-size:0.65rem;">✕</button>
            </div>
            <pre style="margin-top:4px;white-space:pre-wrap;font-size:0.7rem;color:#555;">${esc(JSON.stringify(l.body,null,2).substring(0,500))}</pre>
            ${l.autoRerun ? '<div style="color:#e8a830;margin-top:4px;">🔄 自动重试: '+esc(JSON.stringify(l.autoRerun))+'</div>' : ''}
          </div>
        `).join('') || '<div style="color:#ccc;text-align:center;">暂无回调日志</div>'}
      </div>
      <button class="btn" onclick="closeCbLog()" style="margin-top:12px;width:100%;">关闭</button>
    `;
    document.getElementById('cbLogModalBg').classList.add('show');
  });
}

function deleteCallback(timeId) {
  if (!confirm('确定删除该条记录？')) return;
  fetch('/api/yingdao/callbacks/' + encodeURIComponent(timeId), {method:'DELETE'})
    .then(r => r.json())
    .then(() => viewCallbacks());
}

function clearCallbacks() {
  if (!confirm('确定清空全部回调日志？')) return;
  fetch('/api/yingdao/callbacks', {method:'DELETE'})
    .then(r => r.json())
    .then(() => viewCallbacks());
}

function closeCbLog() { document.getElementById('cbLogModalBg').classList.remove('show'); }

// ============================================================
// 登录和退出
// ============================================================
function logout() {
  fetch('/api/logout', {method:'POST'}).then(() => { location.href = '/login.html'; });
}

async function checkLogin() {
  try {
    const r = await fetch('/api/check-login');
    const d = await r.json();
    if (!d.logged_in) { location.href = '/login.html'; return false; }
    return true;
  } catch(e) { return true; /* 离线允许 */ }
}

// ============================================================
// 初始化
// ============================================================
checkLogin().then(ok => {
  if (!ok) return;
  loadData().then(() => {
    render();
    document.getElementById('cbUrl').textContent = location.origin + '/api/yingdao/callback';
    if (apiAvailable) refreshRunHistory();
  });
});

// 键盘快捷键
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'n') { e.preventDefault(); addTask(); }
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); exportData(); }
});
</script>
